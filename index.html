<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatFeel - Ваш умный нутрициолог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }

        .logo {
            font-size: 5em;
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .tagline {
            color: #888;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .features {
            text-align: left;
            margin: 30px 0;
        }

        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .feature-icon {
            font-size: 1.5em;
            margin-right: 15px;
        }

        .links {
            margin-top: 40px;
        }

        .links a {
            color: #667eea;
            margin: 0 15px;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .app-store {
            margin-top: 30px;
        }

        .app-store img {
            height: 50px;
        }
    </style>
</head>

<body>
    <div class="container">

                </div>
                <div class="feature">

                </div>
                <div class="feature">
                    <span class="feature-icon">📊</span>
                    <span>Автоматический расчёт калорий</span>
                </div>
                <div class="feature">
